---
# roles/jenkins/tasks/main.yml — Installation de Jenkins

# ── Java ─────────────────────────────────────────────────────────────────────
- name: Installer Java {{ java_version }} (Debian/Ubuntu)
  apt:
    name: "openjdk-{{ java_version }}-jdk"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Installer Java {{ java_version }} (RedHat)
  yum:
    name: "java-{{ java_version }}-openjdk-devel"
    state: present
  when: ansible_os_family == "RedHat"

# ── Dépôt Jenkins (Debian/Ubuntu) ───────────────────────────────────────────
- name: Ajouter la clé GPG Jenkins
  apt_key:
    url: "{{ jenkins_key_url }}"
    state: present
  when: ansible_os_family == "Debian"
  retries: 3
  delay: 5

- name: Ajouter le dépôt Jenkins
  apt_repository:
    repo: "{{ jenkins_repo }}"
    state: present
    filename: jenkins
  when: ansible_os_family == "Debian"

# ── Installation ─────────────────────────────────────────────────────────────
- name: Installer Jenkins
  apt:
    name: "jenkins{% if jenkins_version != 'latest' %}={{ jenkins_version }}{% endif %}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  register: _jenkins_installed

# ── Service ──────────────────────────────────────────────────────────────────
- name: Recharger systemd
  systemd:
    daemon_reload: yes

- name: Démarrer et activer Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

- name: Attendre que Jenkins soit accessible sur le port {{ jenkins_port }}
  wait_for:
    host: 127.0.0.1
    port: "{{ jenkins_port }}"
    delay: 10
    timeout: 300
    state: started

# ── Mot de passe initial ─────────────────────────────────────────────────────
- name: Vérifier la présence du mot de passe initial Jenkins
  stat:
    path: /var/lib/jenkins/secrets/initialAdminPassword
  register: _jenkins_pwd_file

- name: Lire le mot de passe initial Jenkins
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: _jenkins_pwd
  when: _jenkins_pwd_file.stat.exists
  no_log: true

- name: Sauvegarder le mot de passe initial (root only)
  copy:
    content: "{{ _jenkins_pwd.content | b64decode }}"
    dest: /root/.jenkins_initial_password
    mode: '0600'
    owner: root
    group: root
  when: _jenkins_pwd_file.stat.exists
  no_log: true

- name: Résumé Jenkins
  debug:
    msg:
      - "✅ Jenkins installé et démarré"
      - "🌐 Interface : http://localhost:{{ jenkins_port }}"
      - "🔐 Mot de passe initial sauvegardé dans /root/.jenkins_initial_password"
