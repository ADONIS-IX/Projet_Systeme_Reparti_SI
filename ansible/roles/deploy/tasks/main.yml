---
# roles/deploy/tasks/main.yml — Déploiement de l'application sur Kubernetes
# Les variables db_password et django_secret_key sont définies dans playbook.yml

# ── Démarrer Minikube ────────────────────────────────────────────────────────
- name: Démarrer Minikube (driver Docker)
  command: minikube start --driver=docker
  become_user: "{{ ansible_user | default('root') }}"
  register: _minikube_start
  changed_when: "'Done' in _minikube_start.stdout"

# ── Copier les manifests ────────────────────────────────────────────────────
- name: Copier les manifests Kubernetes
  copy:
    src: "{{ playbook_dir }}/../k8s/"
    dest: /tmp/k8s-manifests/
    mode: '0644'

# ── Construire les images Docker ─────────────────────────────────────────────
- name: Configurer Docker pour utiliser le daemon Minikube
  shell: eval $(minikube docker-env) && docker build -t adonisdocker/backend:latest {{ playbook_dir }}/../backend
  become_user: "{{ ansible_user | default('root') }}"

- name: Construire l'image frontend
  shell: |
    eval $(minikube docker-env)
    docker build \
      --build-arg REACT_APP_API_URL="/api" \
      -t adonisdocker/frontend:latest {{ playbook_dir }}/../frontend
  become_user: "{{ ansible_user | default('root') }}"

# ── Créer les Secrets Kubernetes ─────────────────────────────────────────────
- name: Appliquer le manifest des secrets
  k8s:
    state: present
    src: /tmp/k8s-manifests/secrets.yaml

# ── Déployer PostgreSQL ───────────────────────────────────────────────────────
- name: Appliquer le PVC PostgreSQL
  k8s:
    state: present
    src: /tmp/k8s-manifests/postgres-pvc.yaml

- name: Déployer PostgreSQL
  k8s:
    state: present
    src: /tmp/k8s-manifests/postgres-deployment.yaml

- name: Attendre que PostgreSQL soit prêt
  k8s_info:
    kind: Pod
    label_selectors: ["app=postgres"]
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120

# ── Déployer Backend ──────────────────────────────────────────────────────────
- name: Déployer le Backend Django
  k8s:
    state: present
    src: /tmp/k8s-manifests/backend-deployment.yaml

- name: Attendre que le Backend soit prêt
  k8s_info:
    kind: Pod
    label_selectors: ["app=backend"]
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300

# ── Déployer Frontend ─────────────────────────────────────────────────────────
- name: Déployer le Frontend React
  k8s:
    state: present
    src: /tmp/k8s-manifests/frontend-deployment.yaml

- name: Attendre que le Frontend soit prêt
  k8s_info:
    kind: Pod
    label_selectors: ["app=frontend"]
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120

# ── URLs d'accès ──────────────────────────────────────────────────────────────
- name: Récupérer l'IP Minikube
  command: minikube ip
  register: _minikube_ip
  become_user: "{{ ansible_user | default('root') }}"
  changed_when: false

- name: Afficher les URLs d'accès
  debug:
    msg:
      - "✅ Application déployée avec succès !"
      - "🌐 Frontend  → http://{{ _minikube_ip.stdout }}:30080"
      - "🔌 Backend   → http://{{ _minikube_ip.stdout }}:30800/api"
