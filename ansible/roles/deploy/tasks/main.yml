---
# Déploiement de l'application sur Kubernetes

- name: Copier les manifests Kubernetes
  copy:
    src: "{{ playbook_dir }}/../k8s/"
    dest: /tmp/k8s-manifests/
    mode: '0644'

- name: Démarrer Minikube
  command: minikube start --driver=docker
  become_user: "{{ ansible_user }}"
  register: minikube_start
  changed_when: "'Done!' in minikube_start.stdout"

- name: Configurer Docker pour Minikube
  shell: eval $(minikube docker-env)
  become_user: "{{ ansible_user }}"

- name: Construire l'image backend
  docker_image:
    name: backend
    tag: latest
    build:
      path: "{{ playbook_dir }}/../backend"
    source: build
  become_user: "{{ ansible_user }}"

- name: Construire l'image frontend
  docker_image:
    name: frontend
    tag: latest
    build:
      path: "{{ playbook_dir }}/../frontend"
    source: build
  become_user: "{{ ansible_user }}"

- name: Créer le secret db-secret
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: db-secret
      type: Opaque
      stringData:
        password: "{{ db_password }}"

- name: Créer le secret django-secret
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: django-secret
      type: Opaque
      stringData:
        secret-key: "{{ django_secret_key }}"

- name: Déployer PostgreSQL
  k8s:
    state: present
    src: /tmp/k8s-manifests/postgres-pvc.yaml

- name: Déployer PostgreSQL deployment
  k8s:
    state: present
    src: /tmp/k8s-manifests/postgres-deployment.yaml

- name: Attendre que PostgreSQL soit prêt
  k8s_info:
    kind: Pod
    label_selectors:
      - app=postgres
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120

- name: Déployer Backend
  k8s:
    state: present
    src: /tmp/k8s-manifests/backend-deployment.yaml

- name: Attendre que le backend soit prêt
  k8s_info:
    kind: Pod
    label_selectors:
      - app=backend
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300

- name: Déployer Frontend
  k8s:
    state: present
    src: /tmp/k8s-manifests/frontend-deployment.yaml

- name: Attendre que le frontend soit prêt
  k8s_info:
    kind: Pod
    label_selectors:
      - app=frontend
    wait: yes
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300

- name: Obtenir l'URL du frontend
  command: minikube service frontend --url
  register: frontend_url
  become_user: "{{ ansible_user }}"
  changed_when: false

- name: Afficher l'URL du frontend
  debug:
    msg: "Frontend accessible sur: {{ frontend_url.stdout }}"