---
# roles/kubernetes/tasks/main.yml — Installation de kubectl et Minikube

- name: Créer le répertoire de téléchargements temporaires
  file:
    path: /tmp/k8s-downloads
    state: directory
    mode: '0755'

# ── kubectl ─────────────────────────────────────────────────────────────────
- name: Vérifier si kubectl est déjà présent
  stat:
    path: /usr/local/bin/kubectl
  register: _kubectl_stat

- name: Installer kubectl
  block:
    - name: Télécharger kubectl {{ kubectl_version }}
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /tmp/k8s-downloads/kubectl
        mode: '0755'
        checksum: "sha256:https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl.sha256"
      retries: 3
      delay: 5

    - name: Installer kubectl dans /usr/local/bin
      copy:
        src: /tmp/k8s-downloads/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
        remote_src: yes

  when: not _kubectl_stat.stat.exists or force_reinstall

# ── Minikube ─────────────────────────────────────────────────────────────────
- name: Vérifier si Minikube est déjà présent
  stat:
    path: /usr/local/bin/minikube
  register: _minikube_stat

- name: Installer Minikube
  block:
    - name: Télécharger Minikube v{{ minikube_version }}
      get_url:
        url: "https://github.com/kubernetes/minikube/releases/download/v{{ minikube_version }}/minikube-linux-amd64"
        dest: /tmp/k8s-downloads/minikube
        mode: '0755'
      retries: 3
      delay: 5

    - name: Installer Minikube dans /usr/local/bin
      copy:
        src: /tmp/k8s-downloads/minikube
        dest: /usr/local/bin/minikube
        mode: '0755'
        remote_src: yes

  when: not _minikube_stat.stat.exists or force_reinstall

# ── Vérifications ────────────────────────────────────────────────────────────
- name: Vérifier kubectl
  command: kubectl version --client
  register: _kubectl_ver
  changed_when: false

- name: Afficher la version kubectl
  debug:
    msg: "✅ kubectl : {{ _kubectl_ver.stdout_lines[0] }}"

- name: Vérifier Minikube
  command: minikube version
  register: _minikube_ver
  changed_when: false

- name: Afficher la version Minikube
  debug:
    msg: "✅ Minikube : {{ _minikube_ver.stdout_lines[0] }}"

# ── Nettoyage ────────────────────────────────────────────────────────────────
- name: Supprimer les fichiers temporaires
  file:
    path: /tmp/k8s-downloads
    state: absent
  when: cleanup_temp_files
