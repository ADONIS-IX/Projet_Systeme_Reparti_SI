---
# roles/docker/tasks/main.yml — Installation de Docker

# ── Détection de l'architecture ────────────────────────────────────────────
- name: Définir la distribution et l'architecture Docker
  set_fact:
    _docker_distro: "{{ 'debian' if ansible_distribution == 'Debian' else 'ubuntu' }}"
    _docker_arch:   "{{ 'arm64' if ansible_machine == 'aarch64' else 'amd64' }}"

# ── Debian / Ubuntu ─────────────────────────────────────────────────────────
- name: Installer Docker (Debian/Ubuntu)
  block:

    - name: Installer les dépendances apt
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release]
        state: present
        update_cache: yes

    - name: Ajouter la clé GPG Docker
      apt_key:
        url: "https://download.docker.com/linux/{{ _docker_distro }}/gpg"
        state: present
      retries: 3
      delay: 5

    - name: Ajouter le dépôt Docker
      apt_repository:
        repo: "deb [arch={{ _docker_arch }}] https://download.docker.com/linux/{{ _docker_distro }} {{ ansible_distribution_release }} stable"
        state: present
        filename: docker-ce

    - name: Installer Docker CE et le plugin Compose
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes

  when: ansible_os_family == "Debian"
  tags: [docker, install]

# ── RedHat / CentOS ─────────────────────────────────────────────────────────
- name: Installer Docker (RedHat/CentOS)
  block:

    - name: Installer les dépendances yum
      yum:
        name: [yum-utils, device-mapper-persistent-data, lvm2]
        state: present

    - name: Ajouter le dépôt Docker
      command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Installer Docker CE
      yum:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present

  when: ansible_os_family == "RedHat"
  tags: [docker, install]

# ── Configuration du daemon ─────────────────────────────────────────────────
- name: Créer le répertoire /etc/docker
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Écrire la configuration du daemon Docker
  copy:
    content: "{{ docker_daemon_config | to_nice_json }}"
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Redémarrer Docker
  when: docker_daemon_config is defined

# ── Service ─────────────────────────────────────────────────────────────────
- name: Recharger systemd
  systemd:
    daemon_reload: yes

- name: Démarrer et activer Docker
  service:
    name: docker
    state: started
    enabled: yes

# ── Vérification ────────────────────────────────────────────────────────────
- name: Vérifier l'installation de Docker
  command: docker --version
  register: _docker_ver
  changed_when: false

- name: Afficher la version Docker installée
  debug:
    msg: "✅ Docker installé : {{ _docker_ver.stdout }}"
