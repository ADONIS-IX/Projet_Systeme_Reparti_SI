services:
  # Base de données PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers=3 --threads=2 --timeout=120"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DEBUG: "${DEBUG:-True}"
      SECRET_KEY: "${SECRET_KEY:-django-insecure-dev-key-change-in-production}"
      DB_NAME: "${DB_NAME:-postgres}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST: "db"
      DB_PORT: "5432"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANT: Variables REACT_APP_* doivent être en args (build time)
        REACT_APP_API_URL: "${REACT_APP_API_URL:-http://localhost:8000/api}"
    container_name: react_frontend
    restart: unless-stopped
    ports:
      - "3000:80"  # Accessible sur http://localhost:3000
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  app-network:
    driver: bridge