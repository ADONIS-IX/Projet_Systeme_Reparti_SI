# ============================================================
# JOB : Migrations Django (s'exécute une seule fois avant le Deployment)
# Appliquer avec : kubectl apply -f backend-deployment.yaml
# Attendre la fin : kubectl wait --for=condition=complete job/django-migrate --timeout=120s
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  labels:
    app: backend
    role: migration
spec:
  # Si le Job échoue, Kubernetes réessaie jusqu'à 3 fois
  backoffLimit: 3
  # Nettoyage automatique du Job 5 minutes après complétion
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: backend
        role: migration
    spec:
      # Le Job ne redémarre pas en cas de succès
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Attente de PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL est pret."
      containers:
      - name: django-migrate
        image: adonisdocker/backend:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "manage.py", "migrate", "--noinput"]
        env:
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DEBUG
          value: "False"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: secret-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
# ============================================================
# DEPLOYMENT : Backend Django + Gunicorn
# À appliquer APRÈS la complétion du Job django-migrate
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Attente de PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL est pret."
      containers:
      - name: backend
        image: adonisdocker/backend:latest
        # IfNotPresent : utilise l'image locale buildée dans Minikube via (eval $(minikube docker-env))
        # Always tenterait un pull Docker Hub et échouerait pour des images locales
        imagePullPolicy: IfNotPresent
        # Gunicorn démarre directement, les migrations sont gérées par le Job
        command:
        - sh
        - -c
        - |
          gunicorn core.wsgi:application \
            --bind 0.0.0.0:8000 \
            --workers=2 \
            --threads=2 \
            --timeout=120
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DEBUG
          value: "False"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: secret-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/
            port: 8000
          # Délai réduit : les migrations sont déjà faites par le Job
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
---
# ============================================================
# SERVICE : Exposition du backend
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
    nodePort: 30800
  selector:
    app: backend