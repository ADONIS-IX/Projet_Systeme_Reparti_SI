---
# Configuration Docker
docker_version: "latest"
docker_architecture: "{{ 'arm64' if ansible_machine == 'aarch64' else 'amd64' }}"

# Options
enable_docker_user_group: false  # ⚠️ Risque de sécurité
test_docker_installation: false

# Configuration Docker daemon (optionnel)
docker_daemon_config:
  debug: false
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: overlay2