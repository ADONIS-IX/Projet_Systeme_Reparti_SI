---
# playbook.yml — Configuration complète de l'infrastructure
# Cible : machine locale sous Linux (WSL2 recommandé sous Windows)

- name: Configuration complète de l'infrastructure DevOps
  hosts: local
  become: yes

  vars:
    # ── Secrets applicatifs ──────────────────────────────────────────────────
    # Ces valeurs sont cohérentes avec k8s/secrets.yaml et docker-compose.yml
    db_password: "adriano"
    django_secret_key: "unjourlesoleilbrillera"

    # ── Versions ─────────────────────────────────────────────────────────────
    docker_version: "latest"
    kubectl_version: "v1.28.0"
    minikube_version: "1.32.0"
    java_version: "21"
    jenkins_port: 8080

  roles:
    - docker
    - kubernetes
    - jenkins
    - deploy

  post_tasks:
    - name: Résumé de l'installation
      debug:
        msg:
          - "══════════════════════════════════"
          - " Installation terminée avec succès"
          - "══════════════════════════════════"
          - " Docker     : installé"
          - " Minikube   : installé"
          - " kubectl    : installé"
          - " Jenkins    : http://localhost:{{ jenkins_port }}"
          - " Application: déployée sur Kubernetes"
          - "──────────────────────────────────"
          - " kubectl get pods"
          - " kubectl get services"
          - " minikube service frontend --url"
